# Copier configuration for the Go template — V3
# https://copier.readthedocs.io/

_min_copier_version: "9.0.0"
_subdirectory: template
_templates_suffix: .jinja
_answers_file: .copier-answers.yml

# ──────────────────────────────────────────────────────────────────────────────
# Identity
# ──────────────────────────────────────────────────────────────────────────────

project_name:
  type: str
  help: "Project name (kebab-case, also the directory name)"
  validator: >-
    {% if not (project_name | regex_search('^[a-z][a-z0-9-]*$')) %}
    must be lowercase kebab-case (e.g. my-project)
    {% endif %}

github_user:
  type: str
  help: "GitHub username (owner of the repo; used in module path and LICENSE)"
  default: ""
  validator: >-
    {% if not github_user %}
    required (e.g. octocat). The scaffolding-project skill passes this via --data when $GITHUB_OWNER or $GITHUB_USER is exported.
    {% endif %}

module_path:
  type: str
  default: "github.com/{{ github_user }}/{{ project_name }}"
  when: false

go_version:
  type: str
  help: "Go version"
  default: "1.26.1"

author_name:
  type: str
  default: "{{ github_user }}"
  when: false

# ──────────────────────────────────────────────────────────────────────────────
# Project type
# ──────────────────────────────────────────────────────────────────────────────

project_type:
  type: str
  help: "Project type"
  choices:
    Single-service REST API: single-service-rest
    Single-service gRPC: single-service-grpc
    Single-service GraphQL: single-service-graphql
    CLI application (single binary): cli
    Library (no cmd, flat layout): library
    Study or tutorial (scenario-named packages): study-tutorial
    Multi-service workspace (go.work + kit): multi-service-workspace
  default: single-service-rest

cli_style:
  type: str
  help: "CLI complexity"
  choices:
    Simple (single-command, os.Args, no subcommands — scripts, pipes, assessments): cli-simple
    Complex (multi-command with cobra, domain/, config/ — GitHub releasers, deployment tools): cli-complex
  default: cli-simple
  when: "{{ project_type == 'cli' }}"

domain_names:
  type: str
  help: "Scenario package names, comma-separated (leave empty to add later, e.g. goroutines,channels,selects,contexts)"
  default: ""
  when: "{{ project_type == 'study-tutorial' }}"

study_entrypoint:
  type: str
  help: "Entrypoint for the study dispatcher"
  choices:
    CLI (cmd/concurrency, --pattern flag): cli
    REST (cmd/api, one POST per scenario): rest
  default: cli
  when: "{{ project_type == 'study-tutorial' }}"

include_store:
  type: bool
  help: "Generate internal/store (map+sync.RWMutex shared store)? Recommended for scenarios that share state."
  default: true
  when: "{{ project_type == 'study-tutorial' }}"

service_names:
  type: str
  help: "Initial service names, comma-separated (e.g. api,worker,migrator)"
  default: ""
  when: "{{ project_type == 'multi-service-workspace' }}"

# ──────────────────────────────────────────────────────────────────────────────
# Optional features
# ──────────────────────────────────────────────────────────────────────────────

include_db:
  type: bool
  help: "Include Postgres + GORM + atlas migrations? (recommended for services)"
  default: true
  when: "{{ project_type in ['single-service-rest', 'single-service-grpc', 'single-service-graphql', 'multi-service-workspace'] }}"

include_grpc:
  type: bool
  help: "Include proto/ + gRPC bootstrap?"
  default: false
  when: "{{ project_type in ['single-service-rest', 'single-service-grpc', 'multi-service-workspace'] }}"

include_otel:
  type: bool
  help: "Include OpenTelemetry tracing setup?"
  default: true
  when: "{{ project_type in ['single-service-rest', 'single-service-grpc', 'single-service-graphql', 'multi-service-workspace'] }}"

include_e2e:
  type: bool
  help: "Include test/e2e suite skeleton?"
  default: true
  when: "{{ project_type in ['single-service-rest', 'single-service-grpc', 'single-service-graphql', 'multi-service-workspace'] }}"

include_dockerfile:
  type: bool
  help: "Include Dockerfile + docker-compose.yml?"
  default: true
  when: "{{ project_type in ['single-service-rest', 'single-service-grpc', 'single-service-graphql', 'multi-service-workspace'] }}"

include_mockery:
  type: bool
  help: "Include .mockery.yaml for mock generation?"
  default: true
  when: "{{ project_type in ['single-service-rest', 'single-service-grpc', 'single-service-graphql', 'library'] or is_cli_complex }}"

include_env_example:
  type: bool
  help: ".env.example file?"
  default: true
  when: "{{ project_type in ['single-service-rest', 'single-service-grpc', 'single-service-graphql', 'multi-service-workspace'] }}"

# ──────────────────────────────────────────────────────────────────────────────
# License
# ──────────────────────────────────────────────────────────────────────────────

license:
  type: str
  help: "License"
  choices: [MIT, Apache-2.0, none]
  default: MIT

current_year:
  type: str
  default: "{{ '%Y' | strftime }}"
  when: false

# ──────────────────────────────────────────────────────────────────────────────
# Computed flags (used by templates and tasks)
# ──────────────────────────────────────────────────────────────────────────────

# Convenience boolean: "is this a service-style project that ships a binary?"
is_service:
  type: bool
  default: "{{ project_type in ['single-service-rest', 'single-service-grpc', 'single-service-graphql'] }}"
  when: false

is_cli:
  type: bool
  default: "{{ project_type == 'cli' }}"
  when: false

is_cli_complex:
  type: bool
  default: "{{ project_type == 'cli' and cli_style == 'cli-complex' }}"
  when: false

# ──────────────────────────────────────────────────────────────────────────────
# Per-file conditionals
# ──────────────────────────────────────────────────────────────────────────────

_exclude:
  - "*.pyc"
  - "__pycache__"
  - ".copier-answers.yml"
  # go.work + kit only for workspace
  - "{% if project_type != 'multi-service-workspace' %}go.work{% endif %}"
  - "{% if project_type != 'multi-service-workspace' %}kit{% endif %}"
  # Root go.mod: skip for workspace (each service has its own)
  - "{% if project_type == 'multi-service-workspace' %}/go.mod{% endif %}"
  # Dockerfile / compose
  - "{% if not include_dockerfile or project_type in ['library', 'study-tutorial', 'multi-service-workspace', 'cli'] %}Dockerfile{% endif %}"
  - "{% if not include_dockerfile or project_type in ['library', 'study-tutorial', 'cli'] %}docker-compose.yml{% endif %}"
  - "{% if not include_dockerfile or project_type in ['library', 'study-tutorial', 'cli'] %}docker-compose.dev.yml{% endif %}"
  - "{% if not include_e2e or not is_service %}docker-compose.e2e.yml{% endif %}"
  - "{% if not include_env_example or project_type in ['library', 'study-tutorial', 'cli'] %}.env.example{% endif %}"
  - "{% if not include_mockery or project_type in ['study-tutorial', 'multi-service-workspace'] or (is_cli and not is_cli_complex) %}.mockery.yaml{% endif %}"
  - "{% if license == 'none' %}LICENSE{% endif %}"
  # cmd dir for service types and CLI
  - "{% if not is_service and project_type != 'cli' %}cmd{% endif %}"
  - "{% if project_type == 'cli' %}cmd/api{% endif %}"
  - "{% if project_type != 'cli' %}cmd/main.go{% endif %}"
  # internal/ subdirs that only make sense for service types
  - "{% if not is_service %}internal/bootstrap{% endif %}"
  - "{% if not is_service %}internal/app{% endif %}"
  - "{% if not is_service %}internal/middleware{% endif %}"
  - "{% if not is_service and not is_cli_complex %}internal/config{% endif %}"
  # internal/cli — variants based on complexity
  - "{% if is_cli_complex %}internal/cli/runner.go{% endif %}"
  - "{% if is_cli_complex %}internal/cli/runner_test.go{% endif %}"
  - "{% if is_cli and not is_cli_complex %}internal/cli/root.go{% endif %}"
  - "{% if is_cli and not is_cli_complex %}internal/cli/example.go{% endif %}"
  # internal/cli only for CLI; excluded for all other types
  - "{% if project_type != 'cli' %}internal/cli{% endif %}"
  # internal/domain only for cli-complex
  - "{% if not is_cli_complex %}internal/domain{% endif %}"
  # internal/config files — service vs CLI variants
  - "{% if is_cli_complex %}internal/config/config.go{% endif %}"
  - "{% if is_cli_complex %}internal/config/loader.go{% endif %}"
  - "{% if not is_cli_complex %}internal/config/cli.go{% endif %}"
  # internal/ only for service types and library
  - "{% if project_type in ['study-tutorial', 'multi-service-workspace'] %}internal{% endif %}"
  - "{% if project_type in ['study-tutorial', 'multi-service-workspace', 'cli'] %}pkg{% endif %}"
  # DB / migrations
  - "{% if not include_db or not is_service %}db{% endif %}"
  - "{% if not include_db or not is_service %}internal/database{% endif %}"
  - "{% if not include_db or not is_service %}internal/bootstrap/database.go{% endif %}"
  # gRPC
  - "{% if not include_grpc %}proto{% endif %}"
  - "{% if not include_grpc or not is_service %}internal/bootstrap/grpc.go{% endif %}"
  # OTel
  - "{% if not include_otel or not is_service %}pkg/telemetry{% endif %}"
  - "{% if not include_otel or not is_service %}internal/bootstrap/telemetry.go{% endif %}"
  - "{% if not include_otel or not is_service %}otel-collector-config.yml{% endif %}"
  - "{% if not include_otel %}docs/observability.md{% endif %}"
  # integration tests (previously test/e2e)
  - "{% if not include_e2e or not is_service %}internal/testing{% endif %}"
  # repository files that require a real DB
  - "{% if not include_db or not is_service %}internal/app/example/repository/example.go{% endif %}"
  - "{% if not include_db or not is_service %}internal/app/example/repository/repository_test.go{% endif %}"
  # docs / scripts only for service-shaped projects
  - "{% if not is_service %}docs{% endif %}"
  - "{% if not is_service %}scripts{% endif %}"
  - "{% if not include_db or not is_service %}scripts/migrate.sh{% endif %}"
  - "{% if not include_db or not is_service %}scripts/init-db.sh{% endif %}"

# ──────────────────────────────────────────────────────────────────────────────
# Post-generation tasks
# ──────────────────────────────────────────────────────────────────────────────

_tasks:
  - command: "chmod +x scripts/*.sh 2>/dev/null || true"
    when: "{{ is_service }}"
  - command: "go mod tidy"
    when: "{{ project_type not in ['study-tutorial', 'multi-service-workspace'] }}"
  - command: >-
      MODULE_PATH='{{ module_path }}'
      ENTRYPOINT='{{ study_entrypoint }}'
      INCLUDE_STORE='{{ include_store }}'
      DOMAIN_NAMES='{{ domain_names }}'
      bash '{{ _copier_conf.src_path }}/_scripts/study-tutorial.sh'
    when: "{{ project_type == 'study-tutorial' }}"
  - command: "go mod tidy"
    when: "{{ project_type == 'study-tutorial' }}"
  - command: >-
      MODULE_PATH='{{ module_path }}'
      PROJECT_NAME='{{ project_name }}'
      GO_VERSION='{{ go_version }}'
      INCLUDE_DOCKERFILE='{{ include_dockerfile }}'
      SERVICE_NAMES='{{ service_names }}'
      bash '{{ _copier_conf.src_path }}/_scripts/multi-service-workspace.sh'
    when: "{{ project_type == 'multi-service-workspace' }}"
  # Note: git init, remote, external AI memory, and initial commit
  # are handled by the scaffolding-project skill — copier focuses on file rendering.
